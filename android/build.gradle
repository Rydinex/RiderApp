buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// NDK 27 no longer auto-links libc++_shared for all external CMake projects.
// Ensure Android library subprojects that use CMake get this linker flag.
subprojects { project ->
    project.pluginManager.withPlugin("com.android.library") {
        try {
            project.android.defaultConfig.externalNativeBuild.cmake
                .arguments("-DCMAKE_SHARED_LINKER_FLAGS=-lc++_shared")
        } catch (Exception ignored) {
            // Skip libraries that do not define CMake externalNativeBuild.
        }
    }
}
